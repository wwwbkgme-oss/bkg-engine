<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">NOVA 2.5 technical design board</title>
  <desc id="desc">A dark technical overview board for NOVA 2.5 showing systems, world director AI, data models, character editor targets, roadmap, and performance goals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#03060b"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#101b2b" stop-opacity="0.97"/>
      <stop offset="1" stop-color="#07101b" stop-opacity="0.97"/>
    </linearGradient>
    <style>
      .panel{fill:url(#panel);stroke:#2d455f;stroke-width:1.1}
      .cell{fill:#0c1624;stroke:#30465c;stroke-width:1}
      .accent{fill:#f6d80f}
      .cyan{fill:#39dff6}
      .pink{fill:#ff3fd7}
      .green{fill:#3dff9e}
      .text{fill:#e9f2ff}
      .muted{fill:#9fb4ca}
      .dim{fill:#718399}
      .line{stroke:#26394f;stroke-width:1}
      .mono{font-family:ui-monospace,SFMono-Regular,Consolas,monospace}
      .sans{font-family:Segoe UI,Arial,sans-serif}
    </style>
  </defs>
  <rect width="1600" height="1100" fill="url(#bg)"/>
  <g opacity="0.25" stroke="#1e3148" stroke-width="1">
    <path d="M32 92H1568M32 1010H1568M32 0V1100M1568 0V1100"/>
    <path d="M0 180H1600M0 320H1600M0 460H1600M0 600H1600M0 740H1600M0 880H1600"/>
    <path d="M220 0V1100M440 0V1100M660 0V1100M880 0V1100M1100 0V1100M1320 0V1100"/>
  </g>
  <g class="sans">
    <text x="34" y="48" class="text" font-size="32" font-weight="800">NOVA ENGINE - <tspan class="accent">2D VOXEL SANDBOX</tspan> MIT <tspan class="cyan">2.5D SPEZIALZONEN</tspan></text>
    <text x="36" y="76" class="muted" font-size="15">Tech-Design-Dokument und Entwicklungsplan fuer Rust</text>
    <text x="1244" y="50" class="text" font-size="40" font-weight="800">NOVA <tspan class="accent">2.5</tspan></text>
    <text x="1248" y="78" class="muted" font-size="13" letter-spacing="2">NEXT-GEN OPEN VOXEL ARCHITECTURE</text>
  </g>

  <g transform="translate(34 112)">
    <rect class="panel" width="610" height="300" rx="5"/>
    <text x="18" y="30" class="text sans" font-size="18" font-weight="700">1. UEBERBLICK</text>
    <text x="18" y="62" class="muted mono" font-size="13">NOVA 2.5 ist eine eigenstaendige Rust Engine.</text>
    <text x="18" y="86" class="muted mono" font-size="13">Keine bestehende Game Engine. Low-Level Libraries erlaubt.</text>
    <text x="18" y="128" class="text sans" font-size="17" font-weight="700">2. HAUPTFEATURES</text>
    <g class="mono" font-size="13">
      <text x="26" y="160" class="green">- 2D Voxel-Sandbox mit Chunks</text>
      <text x="26" y="184" class="green">- optionale 2.5D Spezialzonen</text>
      <text x="26" y="208" class="green">- WorldDirectorAI fuer Planeten, Quests, Fraktionen</text>
      <text x="26" y="232" class="green">- eigenes ECS, Renderer, Save System, Modding</text>
      <text x="26" y="256" class="green">- Character Editor Ziel: dunkle Cyberpunk Engine UI</text>
    </g>
  </g>

  <g transform="translate(674 112)">
    <rect class="panel" width="476" height="300" rx="5"/>
    <text x="18" y="30" class="text sans" font-size="18" font-weight="700">3. WORLD DIRECTOR AI</text>
    <g class="mono" font-size="13">
      <text x="24" y="64" class="accent">- Planeten, Biome, Hotspots</text>
      <text x="24" y="88" class="accent">- Staedte, Dungeons, Bosszonen</text>
      <text x="24" y="112" class="accent">- Fraktionen, NPC Beziehungen</text>
      <text x="24" y="136" class="accent">- Quests, Wirtschaft, Story Events</text>
      <text x="24" y="176" class="cyan">Validierung:</text>
      <text x="38" y="200" class="muted">deterministisch, logisch, spielbar</text>
      <text x="38" y="224" class="muted">skalierbar, reproduzierbar</text>
      <text x="38" y="248" class="muted">keine zufaelligen Unsinn-Inhalte</text>
    </g>
  </g>

  <g transform="translate(1184 112)">
    <rect class="panel" width="382" height="300" rx="5"/>
    <text x="18" y="30" class="text sans" font-size="18" font-weight="700">4. KERNSYSTEME</text>
    <g class="mono" font-size="13">
      <text x="24" y="62" class="muted">1. Welt und Zonen</text>
      <text x="24" y="86" class="muted">2. Rendering 2D / 2.5D</text>
      <text x="24" y="110" class="muted">3. ECS und Entities</text>
      <text x="24" y="134" class="muted">4. Physik und Kollision</text>
      <text x="24" y="158" class="muted">5. WorldDirectorAI</text>
      <text x="24" y="182" class="muted">6. Quests und Story</text>
      <text x="24" y="206" class="muted">7. Items und Crafting</text>
      <text x="24" y="230" class="muted">8. Save, Modding, Netzwerk</text>
    </g>
  </g>

  <g transform="translate(34 444)">
    <rect class="panel" width="1020" height="182" rx="5"/>
    <text x="18" y="30" class="text sans" font-size="18" font-weight="700">5. ZONENTYPEN</text>
    <g class="mono" font-size="12">
      <rect x="20" y="52" width="980" height="28" class="cell"/>
      <text x="42" y="71" class="accent">ZONENTYP</text><text x="260" y="71" class="text">BESCHREIBUNG</text><text x="548" y="71" class="text">MODUS</text><text x="690" y="71" class="text">BEISPIELE</text><text x="872" y="71" class="text">BESONDERHEIT</text>
      <text x="42" y="106" class="green">WILDERNIS</text><text x="260" y="106" class="muted">normale Welt</text><text x="548" y="106" class="pink">2D</text><text x="690" y="106" class="muted">Oberflaeche, Hoehlen</text><text x="872" y="106" class="muted">schnell, gross</text>
      <text x="42" y="132" class="cyan">STADT</text><text x="260" y="132" class="muted">Spezialzone</text><text x="548" y="132" class="pink">2.5D</text><text x="690" y="132" class="muted">Metro, Markt</text><text x="872" y="132" class="muted">NPCs, Handel</text>
      <text x="42" y="158" class="accent">DUNGEON</text><text x="260" y="158" class="muted">instanziert</text><text x="548" y="158" class="pink">2.5D</text><text x="690" y="158" class="muted">Ruinen, Boss</text><text x="872" y="158" class="muted">Raetsel, Loot</text>
    </g>
  </g>

  <g transform="translate(1084 444)">
    <rect class="panel" width="482" height="182" rx="5"/>
    <text x="18" y="30" class="text sans" font-size="18" font-weight="700">6. TECHNISCHE BASIS</text>
    <g class="mono" font-size="13">
      <text x="24" y="64" class="accent">- Sprache: Rust</text>
      <text x="24" y="88" class="accent">- Rendering: wgpu, eigene Pipeline</text>
      <text x="24" y="112" class="accent">- Tools: egui, Editor UI</text>
      <text x="24" y="136" class="accent">- Save: binaer, versioniert, modfaehig</text>
      <text x="24" y="160" class="accent">- Async: tokio, rayon, Streaming</text>
    </g>
  </g>

  <g transform="translate(34 658)">
    <rect class="panel" width="720" height="304" rx="5"/>
    <text x="18" y="30" class="text sans" font-size="18" font-weight="700">7. CHARACTER EDITOR - ZIELDESIGN</text>
    <rect x="22" y="54" width="188" height="232" class="cell"/>
    <text x="36" y="82" class="text mono" font-size="13">CHARACTER LIST</text>
    <rect x="36" y="104" width="150" height="48" fill="#171a0b" stroke="#f6d80f"/>
    <text x="52" y="130" class="accent mono" font-size="12">KAI  LEVEL 42</text>
    <rect x="36" y="164" width="150" height="42" fill="#0b1522" stroke="#30465c"/>
    <text x="52" y="190" class="muted mono" font-size="12">ZARA</text>
    <rect x="36" y="216" width="150" height="42" fill="#0b1522" stroke="#30465c"/>
    <text x="52" y="242" class="muted mono" font-size="12">ASH</text>
    <rect x="232" y="54" width="276" height="232" class="cell"/>
    <text x="270" y="88" class="cyan mono" font-size="13">LIVE VOXEL PREVIEW</text>
    <rect x="330" y="116" width="92" height="126" fill="#121d2b" stroke="#39dff6"/>
    <text x="302" y="264" class="accent mono" font-size="13">ENTER WORLD</text>
    <rect x="532" y="54" width="166" height="232" class="cell"/>
    <text x="548" y="82" class="text mono" font-size="13">EDITOR</text>
    <text x="548" y="112" class="accent mono" font-size="12">BODY</text>
    <text x="548" y="138" class="muted mono" font-size="12">HEAD</text>
    <text x="548" y="164" class="muted mono" font-size="12">HAIR</text>
    <text x="548" y="190" class="muted mono" font-size="12">CYBER</text>
    <text x="548" y="226" class="cyan mono" font-size="12">SLIDERS / SWATCHES</text>
  </g>

  <g transform="translate(790 658)">
    <rect class="panel" width="566" height="304" rx="5"/>
    <text x="18" y="30" class="text sans" font-size="18" font-weight="700">8. ROADMAP</text>
    <g class="mono" font-size="12">
      <rect x="20" y="54" width="118" height="44" class="cell"/><text x="34" y="80" class="text">1 PROTOTYP</text>
      <rect x="154" y="54" width="118" height="44" class="cell"/><text x="168" y="80" class="text">2 CHUNKS</text>
      <rect x="288" y="54" width="118" height="44" class="cell"/><text x="302" y="80" class="text">3 RENDER</text>
      <rect x="422" y="54" width="118" height="44" class="cell"/><text x="436" y="80" class="text">4 2.5D</text>
      <rect x="20" y="120" width="118" height="44" class="cell"/><text x="34" y="146" class="text">5 PLANET</text>
      <rect x="154" y="120" width="118" height="44" class="cell"/><text x="168" y="146" class="text">6 ITEMS</text>
      <rect x="288" y="120" width="118" height="44" class="cell"/><text x="302" y="146" class="text">7 NPC AI</text>
      <rect x="422" y="120" width="118" height="44" class="cell"/><text x="436" y="146" class="text">8 QUESTS</text>
      <rect x="20" y="186" width="118" height="44" class="cell"/><text x="34" y="212" class="text">9 WDAI</text>
      <rect x="154" y="186" width="118" height="44" class="cell"/><text x="168" y="212" class="text">10 CITIES</text>
      <rect x="288" y="186" width="118" height="44" class="cell"/><text x="302" y="212" class="text">11 DUNGEON</text>
      <rect x="422" y="186" width="118" height="44" class="cell"/><text x="436" y="212" class="text">12 ALPHA</text>
    </g>
  </g>

  <g class="mono" font-size="13">
    <text x="34" y="1044" class="dim">PERFORMANCE: 60 FPS MINIMUM / 144 FPS TARGET / MILLIONS OF VOXELS / CHUNK STREAMING</text>
    <text x="1110" y="1044" class="dim">DOC STYLE: TECHNICAL BOARD, NOT FAKE GAMEPLAY SCREENSHOT</text>
  </g>
</svg>

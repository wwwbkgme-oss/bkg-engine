<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 760" role="img" aria-labelledby="title desc">
  <title id="title">BKG Engine runtime console</title>
  <desc id="desc">A cyberpunk-style engine dashboard showing a chunked voxel world, simulation status, active materials, and runtime telemetry.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.52" stop-color="#0c1420"/>
      <stop offset="1" stop-color="#04070d"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#101b2b" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#07101b" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="viewport" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#10223a"/>
      <stop offset="0.48" stop-color="#111827"/>
      <stop offset="1" stop-color="#060910"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .panel{fill:url(#panel);stroke:#284158;stroke-width:1.2}
      .line{stroke:#284158;stroke-width:1}
      .muted{fill:#8fa3b7}
      .text{fill:#e9f2ff}
      .cyan{fill:#39dff6}
      .pink{fill:#ff3fd7}
      .yellow{fill:#f5d90a}
      .green{fill:#3dff9e}
      .mono{font-family:ui-monospace,SFMono-Regular,Consolas,monospace}
      .sans{font-family:Segoe UI,Arial,sans-serif}
    </style>
  </defs>

  <rect width="1440" height="760" fill="url(#bg)"/>
  <path d="M0 88h1440M0 704h1440M280 88v616M1040 88v616" stroke="#1d3247" stroke-width="1"/>

  <g class="sans">
    <text x="34" y="50" fill="#f5d90a" font-size="36" font-weight="800" letter-spacing="2">BKG ENGINE</text>
    <text x="36" y="74" class="muted" font-size="14" letter-spacing="3">NEXT-GEN OPEN VOXEL ARCHITECTURE</text>
    <g transform="translate(340 20)">
      <rect width="94" height="42" rx="4" fill="#132134" stroke="#41556d"/>
      <text x="31" y="27" class="text" font-size="14">CORE</text>
      <rect x="106" width="112" height="42" rx="4" fill="#0c1522" stroke="#26384c"/>
      <text x="134" y="27" class="muted" font-size="14">WORLD</text>
      <rect x="230" width="118" height="42" rx="4" fill="#0c1522" stroke="#26384c"/>
      <text x="252" y="27" class="muted" font-size="14">SIMULATION</text>
      <rect x="360" width="112" height="42" rx="4" fill="#0c1522" stroke="#26384c"/>
      <text x="391" y="27" class="muted" font-size="14">RENDER</text>
      <rect x="484" width="108" height="42" rx="4" fill="#0c1522" stroke="#26384c"/>
      <text x="520" y="27" class="muted" font-size="14">SAVE</text>
    </g>
    <text x="1240" y="38" class="text mono" font-size="15">BUILD 0.1.0</text>
    <text x="1240" y="62" class="muted mono" font-size="13">STATUS: </text>
    <text x="1308" y="62" class="green mono" font-size="13">STABLE</text>
  </g>

  <g transform="translate(24 108)">
    <rect class="panel" width="232" height="560" rx="6"/>
    <text x="18" y="32" class="text sans" font-size="16" font-weight="700">MATERIALS</text>
    <g class="mono" font-size="13">
      <rect x="16" y="54" width="200" height="52" rx="3" fill="#111d2d" stroke="#f5d90a"/>
      <rect x="28" y="70" width="22" height="22" fill="#000000" opacity="0.3" stroke="#39dff6"/>
      <text x="62" y="77" class="text">AIR</text><text x="62" y="96" class="yellow">EMPTY</text>
      <rect x="16" y="116" width="200" height="52" rx="3" fill="#0d1724" stroke="#26384c"/>
      <rect x="28" y="132" width="22" height="22" fill="#6f4e30"/>
      <text x="62" y="139" class="text">DIRT</text><text x="62" y="158" class="muted">SOLID</text>
      <rect x="16" y="178" width="200" height="52" rx="3" fill="#0d1724" stroke="#26384c"/>
      <rect x="28" y="194" width="22" height="22" fill="#5c5f63"/>
      <text x="62" y="201" class="text">STONE</text><text x="62" y="220" class="muted">SOLID</text>
      <rect x="16" y="240" width="200" height="52" rx="3" fill="#0d1724" stroke="#26384c"/>
      <rect x="28" y="256" width="22" height="22" fill="#cdb270"/>
      <text x="62" y="263" class="text">SAND</text><text x="62" y="282" class="yellow">POWDER</text>
      <rect x="16" y="302" width="200" height="52" rx="3" fill="#0d1724" stroke="#26384c"/>
      <rect x="28" y="318" width="22" height="22" fill="#2f6fc5"/>
      <text x="62" y="325" class="text">WATER</text><text x="62" y="344" class="cyan">LIQUID</text>
    </g>
    <line x1="16" x2="216" y1="386" y2="386" class="line"/>
    <text x="18" y="420" class="muted mono" font-size="13">ACTIVE CHUNKS</text>
    <text x="18" y="450" class="text mono" font-size="28">0032</text>
    <text x="122" y="450" class="green mono" font-size="13">+ DIRTY</text>
    <text x="18" y="490" class="muted mono" font-size="13">TICK RATE</text>
    <rect x="18" y="506" width="174" height="6" fill="#16283d"/>
    <rect x="18" y="506" width="138" height="6" fill="#f5d90a"/>
    <text x="18" y="540" class="text mono" font-size="13">64x64 CELLS / CHUNK</text>
  </g>

  <g transform="translate(300 108)">
    <rect class="panel" width="720" height="560" rx="6"/>
    <rect x="18" y="48" width="684" height="410" rx="4" fill="url(#viewport)" stroke="#30465e"/>
    <text x="20" y="30" class="text sans" font-size="16" font-weight="700">WORLD VIEWPORT</text>
    <text x="568" y="30" class="muted mono" font-size="13">ZONE: TEST_CHUNKS_00</text>
    <g opacity="0.45" stroke="#26384c" stroke-width="1">
      <path d="M18 116h684M18 184h684M18 252h684M18 320h684M18 388h684M86 48v410M154 48v410M222 48v410M290 48v410M358 48v410M426 48v410M494 48v410M562 48v410M630 48v410"/>
    </g>
    <g shape-rendering="crispEdges">
      <rect x="18" y="282" width="684" height="176" fill="#5c5f63"/>
      <rect x="18" y="246" width="684" height="54" fill="#6f4e30"/>
      <path d="M18 246h92v-24h92v16h92v-38h92v30h92v-14h92v36h124v30H18z" fill="#774f2e"/>
      <path d="M160 126h18v18h18v18h18v18h18v18h18v18h18v30h-72v-24h-18v-18h-18z" fill="#cdb270" filter="url(#glow)"/>
      <path d="M486 150h18v18h18v18h18v18h18v42h-72z" fill="#cdb270" filter="url(#glow)"/>
      <path d="M334 248h144v30H454v24H430v24h-48v-24h-48z" fill="#2f6fc5" opacity="0.95" filter="url(#glow)"/>
      <rect x="120" y="330" width="108" height="22" fill="#474b52"/>
      <rect x="548" y="344" width="82" height="22" fill="#474b52"/>
      <g fill="#ff3fd7" filter="url(#glow)">
        <rect x="94" y="86" width="4" height="120"/>
        <rect x="620" y="72" width="4" height="136"/>
        <rect x="648" y="92" width="4" height="80"/>
      </g>
      <g fill="#39dff6" filter="url(#glow)">
        <rect x="390" y="84" width="4" height="152"/>
        <rect x="410" y="112" width="4" height="104"/>
        <rect x="36" y="190" width="96" height="4"/>
      </g>
    </g>
    <g fill="none" stroke="#f5d90a" stroke-width="2" opacity="0.85">
      <rect x="18" y="184" width="136" height="136"/>
      <rect x="154" y="184" width="136" height="136"/>
      <rect x="290" y="184" width="136" height="136"/>
      <rect x="426" y="184" width="136" height="136"/>
      <rect x="562" y="184" width="136" height="136"/>
    </g>
    <rect x="210" y="484" width="300" height="52" rx="4" fill="#171a0b" stroke="#f5d90a"/>
    <polygon points="238,500 238,520 256,510" fill="#f5d90a"/>
    <text x="276" y="518" class="yellow sans" font-size="18" font-weight="700">RUN SIMULATION TICK</text>
  </g>

  <g transform="translate(1064 108)">
    <rect class="panel" width="352" height="560" rx="6"/>
    <text x="18" y="32" class="text sans" font-size="16" font-weight="700">ENGINE TELEMETRY</text>
    <g class="mono" font-size="13">
      <text x="22" y="76" class="muted">WORLD SEED</text><text x="220" y="76" class="text">1234</text>
      <text x="22" y="112" class="muted">CURRENT TICK</text><text x="220" y="112" class="yellow">128</text>
      <text x="22" y="148" class="muted">MOVED CELLS</text><text x="220" y="148" class="cyan">24</text>
      <text x="22" y="184" class="muted">DIRTY RENDER</text><text x="220" y="184" class="green">TRUE</text>
    </g>
    <line x1="18" x2="334" y1="214" y2="214" class="line"/>
    <text x="18" y="250" class="text sans" font-size="15" font-weight="700">MINIMAP</text>
    <rect x="18" y="270" width="316" height="190" rx="4" fill="#0b1728" stroke="#26384c"/>
    <g opacity="0.75">
      <path d="M42 424L94 386l42 22 44-72 58 28 64-66" fill="none" stroke="#39dff6" stroke-width="2" filter="url(#glow)"/>
      <path d="M64 318h218M64 354h218M64 390h218M94 292v144M136 292v144M178 292v144M220 292v144M262 292v144" stroke="#20344a" stroke-width="1"/>
      <circle cx="238" cy="362" r="9" fill="#ff3fd7" filter="url(#glow)"/>
      <circle cx="94" cy="386" r="6" fill="#f5d90a" filter="url(#glow)"/>
      <circle cx="302" cy="298" r="6" fill="#39dff6" filter="url(#glow)"/>
    </g>
    <rect x="18" y="488" width="316" height="44" rx="4" fill="#111d2d" stroke="#f5d90a"/>
    <text x="52" y="516" class="yellow sans" font-size="16" font-weight="700">NEXT: WGPU CHUNK RENDERER</text>
  </g>

  <g class="mono" font-size="13" fill="#8fa3b7">
    <text x="28" y="736">PING: local - FPS: 60 - TICK: 128 - SEQ: 8,472,991</text>
    <text x="1130" y="736">CONNECTED TO: ENGINE_CORE</text>
  </g>
</svg>
